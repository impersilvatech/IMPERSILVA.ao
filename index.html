<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="IMPERSILVA HOLDING SGPS — Entre nós, fluem oportunidades. Consultoria empresarial e soluções tecnológicas em Angola."/>
  <meta name="keywords" content="IMPERSILVA, holding, consultoria, tecnologia, angola, empresas, digital"/>
  <meta property="og:title" content="IMPERSILVA HOLDING SGPS"/>
  <meta property="og:description" content="Entre nós, fluem oportunidades."/>
  <title>IMPERSILVA HOLDING SGPS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #0e0e0e;
      --dark:       #161618;
      --charcoal:   #242428;
      --charcoal-lt:#2f2f34;
      --red:        #d62828;
      --red-lt:     #e84040;
      --red-dim:    rgba(214,40,40,0.12);
      --blue:       #1d4ed8;
      --blue-lt:    #3b6ef0;
      --blue-dim:   rgba(29,78,216,0.12);
      --white:      #ffffff;
      --off:        #f0f0f0;
      --gray:       #888896;
      --gray-lt:    #c0c0cc;
      --divider:    rgba(255,255,255,0.07);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--dark);
      color: var(--white);
      overflow-x: hidden;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

    /* ══════════════════════════════════════
       TOPBAR
    ══════════════════════════════════════ */
    .topbar {
      background: var(--black);
      border-bottom: 1px solid var(--divider);
      padding: 0.45rem 1.5rem;
      display: flex; justify-content: flex-end; align-items: center; gap: 2rem;
    }
    .topbar a {
      color: var(--gray-lt);
      text-decoration: none;
      font-size: 0.78rem; font-weight: 400;
      letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 0.35rem;
      transition: color 0.2s;
    }
    .topbar a:hover { color: var(--white); }
    .topbar-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--red);
      display: inline-block;
    }

    /* ══════════════════════════════════════
       NAVBAR
    ══════════════════════════════════════ */
    .navbar {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(14,14,14,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--divider);
    }
    .navbar-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 68px;
    }

    /* ── LOGO ── */
    .logo-link {
      display: flex; flex-direction: column;
      align-items: flex-start; gap: 1px;
      text-decoration: none; line-height: 1;
    }
    .logo-wordmark {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 1.6rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--white); line-height: 1;
    }
    .logo-v   { color: var(--red); }
    .logo-lam { color: var(--blue-lt); }
    .logo-sub {
      font-size: 0.5rem; font-weight: 300;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gray); padding-left: 1px;
    }

    .nav-links { display: flex; align-items: center; gap: 0.1rem; list-style: none; }
    .nav-links a {
      color: var(--gray-lt); text-decoration: none;
      font-size: 0.85rem; font-weight: 400;
      letter-spacing: 0.03em;
      padding: 0.5rem 0.9rem; border-radius: 5px;
      transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--white); background: rgba(255,255,255,0.05); }
    .nav-links a.active { color: var(--white); }
    .nav-cta {
      background: var(--red) !important;
      color: var(--white) !important;
      font-weight: 600 !important;
      padding: 0.5rem 1.3rem !important;
      border-radius: 5px !important;
      letter-spacing: 0.04em !important;
    }
    .nav-cta:hover { background: var(--red-lt) !important; }

    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 0.3rem;
    }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--white); transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none; flex-direction: column;
      background: var(--black);
      border-top: 1px solid var(--divider);
      padding: 1rem 1.5rem; gap: 0.1rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      color: var(--gray-lt); text-decoration: none;
      font-size: 0.95rem; padding: 0.75rem 0;
      border-bottom: 1px solid var(--divider);
      transition: color 0.2s;
    }
    .mobile-menu a:hover { color: var(--white); }

    /* ══════════════════════════════════════
       HERO
    ══════════════════════════════════════ */
    .hero {
      min-height: 100vh;
      position: relative;
      display: flex; align-items: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0; z-index: 0;
      background: var(--dark);
    }
    /* Grade sutil */
    .hero-bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 72px 72px;
    }
    /* Brilho vermelho esquerda */
    .hero-bg::after {
      content: '';
      position: absolute;
      left: -200px; bottom: -100px;
      width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle, rgba(214,40,40,0.12) 0%, transparent 65%);
    }
    /* Brilho azul direita */
    .hero-glow-blue {
      position: absolute;
      right: -150px; top: -150px;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(29,78,216,0.10) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }

    /* Linha decorativa diagonal */
    .hero-stripe {
      position: absolute;
      top: 0; right: 25%;
      width: 3px; height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(214,40,40,0.3), transparent);
      pointer-events: none; z-index: 0;
    }

    .hero-content {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;
      padding-top: 6rem; padding-bottom: 6rem;
      display: grid; grid-template-columns: 1.1fr 0.9fr;
      gap: 4rem; align-items: center;
    }

    .hero-label {
      display: inline-flex; align-items: center; gap: 0.6rem;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gray); margin-bottom: 1.6rem;
    }
    .hero-label-bar {
      display: flex; gap: 3px;
    }
    .hero-label-bar span {
      display: block; width: 18px; height: 3px; border-radius: 2px;
    }
    .hero-label-bar span:first-child { background: var(--red); }
    .hero-label-bar span:last-child  { background: var(--blue); }

    .hero-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 1.2rem;
    }
    .hero-title .accent-red  { color: var(--red); }
    .hero-title .accent-blue { color: var(--blue-lt); }

    .hero-slogan {
      font-family: 'Barlow', sans-serif;
      font-size: 1.05rem; font-weight: 300;
      font-style: italic;
      color: var(--gray-lt);
      margin-bottom: 1.6rem;
      padding-left: 1rem;
      border-left: 3px solid var(--red);
    }

    .hero-desc {
      font-size: 0.97rem; font-weight: 300;
      color: var(--gray);
      line-height: 1.85;
      margin-bottom: 2.5rem;
      max-width: 500px;
    }

    .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }

    .btn-red {
      background: var(--red);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 0.88rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.85rem 2rem;
      border: none; border-radius: 4px;
      cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.5rem;
      transition: all 0.22s;
    }
    .btn-red:hover { background: var(--red-lt); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(214,40,40,0.3); }

    .btn-ghost {
      background: transparent;
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 0.88rem; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.85rem 2rem;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.5rem;
      transition: all 0.22s;
    }
    .btn-ghost:hover { border-color: var(--blue-lt); color: var(--blue-lt); transform: translateY(-2px); }

    /* Cards hero lado direito */
    .hero-visual { display: flex; flex-direction: column; gap: 1.1rem; }

    .hero-card {
      background: var(--charcoal);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 1.4rem 1.6rem;
      display: flex; gap: 1.1rem; align-items: flex-start;
      transition: border-color 0.25s, transform 0.25s;
      animation: slideRight 0.5s ease both;
    }
    .hero-card:hover { border-color: rgba(255,255,255,0.18); transform: translateX(-4px); }
    .hero-card:nth-child(2) { animation-delay: 0.15s; }
    .hero-card:nth-child(3) { animation-delay: 0.3s; }

    .hero-card-accent {
      width: 4px; border-radius: 4px; align-self: stretch; flex-shrink: 0;
    }
    .accent-r { background: var(--red); }
    .accent-b { background: var(--blue); }
    .accent-mix { background: linear-gradient(to bottom, var(--red), var(--blue)); }

    .hero-card-body {}
    .hero-card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--white); margin-bottom: 0.3rem;
    }
    .hero-card-desc { font-size: 0.8rem; color: var(--gray); font-weight: 300; line-height: 1.55; }

    @keyframes slideRight {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .scroll-hint {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      color: var(--gray); font-size: 0.68rem; letter-spacing: 0.15em;
      text-transform: uppercase; z-index: 1;
      animation: bounce 2.5s ease-in-out infinite;
    }
    .scroll-hint::after {
      content: '';
      display: block; width: 1px; height: 44px;
      background: linear-gradient(to bottom, var(--red), transparent);
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(7px); }
    }

    /* ══════════════════════════════════════
       STATS BAR
    ══════════════════════════════════════ */
    .stats-bar {
      background: var(--charcoal);
      border-top: 1px solid var(--divider);
      border-bottom: 1px solid var(--divider);
      padding: 2.5rem 1.5rem;
    }
    .stats-inner {
      max-width: 1200px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1rem; align-items: center;
    }
    .stat-item {
      text-align: center;
      padding: 0 1rem;
      position: relative;
    }
    .stat-item:not(:last-child)::after {
      content: '';
      position: absolute; right: 0; top: 20%; bottom: 20%;
      width: 1px; background: var(--divider);
    }
    .stat-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2.2rem, 4vw, 3rem);
      font-weight: 900; letter-spacing: -0.02em;
      color: var(--white); display: block; line-height: 1;
    }
    .stat-number span.red  { color: var(--red); }
    .stat-number span.blue { color: var(--blue-lt); }
    .stat-label {
      font-size: 0.72rem; font-weight: 400;
      color: var(--gray); letter-spacing: 0.08em;
      text-transform: uppercase; margin-top: 0.4rem;
    }

    /* ══════════════════════════════════════
       SECTIONS BASE
    ══════════════════════════════════════ */
    .section { padding: 6rem 1.5rem; }
    .section-inner { max-width: 1200px; margin: 0 auto; }

    .section-tag {
      display: inline-flex; align-items: center; gap: 0.6rem;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gray); margin-bottom: 1rem;
    }
    .section-tag .tag-bars { display: flex; gap: 3px; }
    .section-tag .tag-bars span { display: block; width: 14px; height: 2px; border-radius: 1px; }
    .section-tag .tag-bars span:first-child { background: var(--red); }
    .section-tag .tag-bars span:last-child  { background: var(--blue); }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.02em; line-height: 1.05;
      margin-bottom: 0.5rem;
    }
    .section-title .red  { color: var(--red); }
    .section-title .blue { color: var(--blue-lt); }

    /* ══════════════════════════════════════
       QUEM SOMOS
    ══════════════════════════════════════ */
    .sobre-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 5rem; align-items: start; margin-top: 3.5rem;
    }
    .sobre-text p {
      font-size: 0.97rem; font-weight: 300;
      color: rgba(255,255,255,0.7); line-height: 1.9;
      margin-bottom: 1.2rem;
    }
    .sobre-text p strong { color: var(--white); font-weight: 600; }
    .sobre-text p .red  { color: var(--red); }
    .sobre-text p .blue { color: var(--blue-lt); }

    .valores-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
      background: var(--divider);
      border: 1px solid var(--divider);
      border-radius: 10px; overflow: hidden;
    }
    .valor-card {
      background: var(--charcoal);
      padding: 1.5rem;
      transition: background 0.25s;
    }
    .valor-card:hover { background: var(--charcoal-lt); }
    .valor-icon {
      font-size: 1.4rem; margin-bottom: 0.7rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .valor-bar { width: 24px; height: 3px; border-radius: 2px; display: inline-block; }
    .valor-bar.r { background: var(--red); }
    .valor-bar.b { background: var(--blue); }
    .valor-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--white); margin-bottom: 0.4rem;
    }
    .valor-desc { font-size: 0.8rem; color: var(--gray); font-weight: 300; line-height: 1.6; }

    /* ══════════════════════════════════════
       EMPRESAS
    ══════════════════════════════════════ */
    .empresas { background: var(--black); padding: 6rem 1.5rem; }
    .empresas-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1.5rem; margin-top: 3.5rem;
    }
    .empresa-card {
      background: var(--charcoal);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 2.5rem 2rem;
      position: relative; overflow: hidden;
      transition: transform 0.3s, border-color 0.3s;
    }
    .empresa-card:hover { transform: translateY(-5px); }
    .empresa-card.card-red { border-top: 3px solid var(--red); }
    .empresa-card.card-red:hover { border-color: var(--red); }
    .empresa-card.card-blue { border-top: 3px solid var(--blue); }
    .empresa-card.card-blue:hover { border-color: var(--blue); }

    .empresa-num {
      position: absolute; right: 1.5rem; top: 1.2rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 5rem; font-weight: 900;
      color: rgba(255,255,255,0.03); line-height: 1;
      pointer-events: none;
    }
    .empresa-badge {
      display: inline-block;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 0.25rem 0.7rem; border-radius: 3px;
      margin-bottom: 1.2rem;
    }
    .badge-red  { background: var(--red-dim);  color: var(--red);     border: 1px solid rgba(214,40,40,0.3); }
    .badge-blue { background: var(--blue-dim); color: var(--blue-lt); border: 1px solid rgba(29,78,216,0.3); }

    .empresa-nome {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.7rem; font-weight: 800;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--white); margin-bottom: 0.2rem; line-height: 1;
    }
    .empresa-subtitulo {
      font-size: 0.78rem; color: var(--gray);
      letter-spacing: 0.06em; margin-bottom: 1.3rem;
      font-weight: 300;
    }
    .empresa-desc {
      font-size: 0.9rem; font-weight: 300;
      color: rgba(255,255,255,0.6); line-height: 1.85;
      margin-bottom: 1.8rem;
    }
    .empresa-features { list-style: none; display: flex; flex-direction: column; gap: 0.55rem; margin-bottom: 2rem; }
    .empresa-features li {
      font-size: 0.85rem; color: rgba(255,255,255,0.7);
      display: flex; align-items: flex-start; gap: 0.6rem;
      font-weight: 300; line-height: 1.5;
    }
    .empresa-features li .bullet { flex-shrink: 0; margin-top: 0.4rem; width: 6px; height: 6px; border-radius: 1px; }
    .bullet-r { background: var(--red); }
    .bullet-b { background: var(--blue-lt); }

    .empresa-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; transition: gap 0.2s;
    }
    .link-red  { color: var(--red); }
    .link-blue { color: var(--blue-lt); }
    .empresa-link:hover { gap: 0.9rem; }

    /* ══════════════════════════════════════
       PROCESSO
    ══════════════════════════════════════ */
    .processo { padding: 6rem 1.5rem; }
    .processo-steps {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; margin-top: 3.5rem;
      background: var(--divider);
      border: 1px solid var(--divider);
      border-radius: 10px; overflow: hidden;
    }
    .passo {
      background: var(--charcoal); padding: 2rem 1.5rem;
      transition: background 0.25s;
    }
    .passo:hover { background: var(--charcoal-lt); }
    .passo-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.5rem; font-weight: 900;
      line-height: 1; margin-bottom: 0.8rem;
    }
    .passo:nth-child(odd) .passo-num  { color: var(--red); }
    .passo:nth-child(even) .passo-num { color: var(--blue-lt); }
    .passo-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--white); margin-bottom: 0.6rem;
    }
    .passo-desc { font-size: 0.82rem; color: var(--gray); font-weight: 300; line-height: 1.65; }

    /* ══════════════════════════════════════
       VISÃO FUTURA
    ══════════════════════════════════════ */
    .visao { background: var(--black); padding: 6rem 1.5rem; position: relative; overflow: hidden; }
    .visao
