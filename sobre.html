<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Sobre a IMPERSILVA HOLDING SGPS — História, missão, visão, valores e a equipa por trás do grupo."/>
  <title>Sobre Nós — IMPERSILVA HOLDING SGPS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #0e0e0e;
      --dark:       #161618;
      --charcoal:   #242428;
      --charcoal-lt:#2f2f34;
      --red:        #d62828;
      --red-lt:     #e84040;
      --red-dim:    rgba(214,40,40,0.12);
      --blue:       #1d4ed8;
      --blue-lt:    #3b6ef0;
      --blue-dim:   rgba(29,78,216,0.12);
      --white:      #ffffff;
      --gray:       #888896;
      --gray-lt:    #c0c0cc;
      --divider:    rgba(255,255,255,0.07);
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'Barlow', sans-serif; background: var(--dark); color: var(--white); overflow-x: hidden; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--black); border-bottom: 1px solid var(--divider);
      padding: 0.45rem 1.5rem;
      display: flex; justify-content: flex-end; align-items: center; gap: 2rem;
    }
    .topbar a {
      color: var(--gray-lt); text-decoration: none;
      font-size: 0.78rem; letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 0.35rem;
      transition: color 0.2s;
    }
    .topbar a:hover { color: var(--white); }
    .topbar-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); display: inline-block; }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(14,14,14,0.97);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--divider);
      transition: border-bottom-color 0.3s;
    }
    .navbar-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 68px;
    }
    .logo-link { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; text-decoration: none; line-height: 1; }
    .logo-wordmark { display: flex; align-items: center; }
    .logo-letters { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.6rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--white); line-height: 1; }
    .logo-sub { font-size: 0.5rem; font-weight: 300; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gray); padding-left: 1px; }

    .nav-links { display: flex; align-items: center; gap: 0.1rem; list-style: none; }
    .nav-links a { color: var(--gray-lt); text-decoration: none; font-size: 0.85rem; font-weight: 400; letter-spacing: 0.03em; padding: 0.5rem 0.9rem; border-radius: 5px; transition: all 0.2s; }
    .nav-links a:hover { color: var(--white); background: rgba(255,255,255,0.05); }
    .nav-links a.active { color: var(--white); }
    .nav-cta { background: var(--red) !important; color: var(--white) !important; font-weight: 600 !important; padding: 0.5rem 1.3rem !important; border-radius: 5px !important; }
    .nav-cta:hover { background: var(--red-lt) !important; }

    .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 0.3rem; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--white); transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu { display: none; flex-direction: column; background: var(--black); border-top: 1px solid var(--divider); padding: 1rem 1.5rem; gap: 0.1rem; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { color: var(--gray-lt); text-decoration: none; font-size: 0.95rem; padding: 0.75rem 0; border-bottom: 1px solid var(--divider); transition: color 0.2s; }
    .mobile-menu a:hover { color: var(--white); }

    /* ── PAGE HERO ── */
    .page-hero {
      background: var(--black);
      padding: 5rem 1.5rem 4rem;
      position: relative; overflow: hidden;
      border-bottom: 1px solid var(--divider);
    }
    .page-hero::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 72px 72px;
    }
    .page-hero::after {
      content: '';
      position: absolute; right: -100px; top: -100px;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(29,78,216,0.08) 0%, transparent 65%);
      pointer-events: none;
    }
    .page-hero-inner {
      max-width: 1200px; margin: 0 auto;
      position: relative; z-index: 1;
    }
    .breadcrumb {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.75rem; color: var(--gray);
      margin-bottom: 1.5rem;
    }
    .breadcrumb a { color: var(--gray); text-decoration: none; transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--white); }
    .breadcrumb-sep { color: var(--divider); font-size: 0.8rem; }
    .breadcrumb-current { color: var(--gray-lt); }

    .page-tag {
      display: inline-flex; align-items: center; gap: 0.6rem;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gray); margin-bottom: 1rem;
    }
    .tag-bars { display: flex; gap: 3px; }
    .tag-bars span { display: block; width: 14px; height: 2px; border-radius: 1px; }
    .tag-bars span:first-child { background: var(--red); }
    .tag-bars span:last-child  { background: var(--blue); }

    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.01em; line-height: 0.95;
      color: var(--white);
    }
    .page-title .red  { color: var(--red); }
    .page-title .blue { color: var(--blue-lt); }

    .page-desc {
      font-size: 1rem; font-weight: 300;
      color: var(--gray); line-height: 1.8;
      max-width: 560px; margin-top: 1.2rem;
    }

    /* ── SECTION BASE ── */
    .section { padding: 5.5rem 1.5rem; }
    .section-inner { max-width: 1200px; margin: 0 auto; }
    .section-tag { display: inline-flex; align-items: center; gap: 0.6rem; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gray); margin-bottom: 1rem; }
    .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; line-height: 1.05; }
    .section-title .red  { color: var(--red); }
    .section-title .blue { color: var(--blue-lt); }

    /* Botões */
    .btn-red { background: var(--red); color: var(--white); font-family: 'Barlow', sans-serif; font-size: 0.88rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.85rem 2rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.22s; }
    .btn-red:hover { background: var(--red-lt); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(214,40,40,0.3); }
    .btn-ghost { background: transparent; color: var(--white); font-family: 'Barlow', sans-serif; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.85rem 2rem; border: 1.5px solid rgba(255,255,255,0.2); border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.22s; }
    .btn-ghost:hover { border-color: var(--blue-lt); color: var(--blue-lt); transform: translateY(-2px); }

    /* ── HISTÓRIA ── */
    .historia { background: var(--dark); }
    .historia-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 5rem; align-items: start; margin-top: 3rem;
    }
    .historia-text p {
      font-size: 0.97rem; font-weight: 300;
      color: rgba(255,255,255,0.7); line-height: 1.9;
      margin-bottom: 1.2rem;
    }
    .historia-text p strong { color: var(--white); font-weight: 600; }
    .historia-text p .red  { color: var(--red); }
    .historia-text p .blue { color: var(--blue-lt); }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .tl-item {
      display: flex; gap: 1.2rem;
      padding-bottom: 2rem;
      position: relative;
    }
    .tl-item:last-child { padding-bottom: 0; }
    .tl-left {
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0; width: 44px;
    }
    .tl-dot {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem; font-weight: 800;
      letter-spacing: 0.04em; flex-shrink: 0;
      border: 2px solid;
    }
    .tl-dot.red  { background: var(--red-dim);  border-color: var(--red);     color: var(--red); }
    .tl-dot.blue { background: var(--blue-dim); border-color: var(--blue-lt); color: var(--blue-lt); }
    .tl-dot.gray { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); color: var(--gray); }
    .tl-line {
      flex: 1; width: 1px; margin-top: 4px;
      background: var(--divider);
    }
    .tl-item:last-child .tl-line { display: none; }
    .tl-content { padding-top: 0.6rem; }
    .tl-year {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--gray); margin-bottom: 0.3rem;
    }
    .tl-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--white); margin-bottom: 0.35rem;
    }
    .tl-desc { font-size: 0.82rem; color: var(--gray); font-weight: 300; line-height: 1.6; }

    /* ── MISSÃO VISÃO VALORES ── */
    .mvv { background: var(--black); padding: 5.5rem 1.5rem; }
    .mvv-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--divider);
      border: 1px solid var(--divider);
      border-radius: 12px; overflow: hidden;
      margin-top: 3rem;
    }
    .mvv-card {
      background: var(--charcoal);
      padding: 2.2rem 1.8rem;
      transition: background 0.25s;
    }
    .mvv-card:hover { background: var(--charcoal-lt); }
    .mvv-icon { font-size: 2rem; margin-bottom: 1rem; }
    .mvv-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .mvv-label.red  { color: var(--red); }
    .mvv-label.blue { color: var(--blue-lt); }
    .mvv-label.gray { color: var(--gray); }
    .mvv-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--white); margin-bottom: 0.8rem; line-height: 1.05;
    }
    .mvv-text { font-size: 0.85rem; color: rgba(255,255,255,0.65); font-weight: 300; line-height: 1.8; }

    /* Valores grid abaixo */
    .valores-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem; margin-top: 1.5rem;
    }
    .valor-item {
      background: var(--charcoal);
      border: 1px solid var(--divider);
      border-radius: 10px; padding: 1.5rem;
      position: relative; overflow: hidden;
      transition: border-color 0.25s, transform 0.25s;
    }
    .valor-item:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.15); }
    .valor-item::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .valor-item:nth-child(odd)::before  { background: var(--red); }
    .valor-item:nth-child(even)::before { background: var(--blue); }
    .valor-icon-big { font-size: 1.6rem; margin-bottom: 0.7rem; }
    .valor-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--white); margin-bottom: 0.4rem;
    }
    .valor-desc { font-size: 0.78rem; color: var(--gray); font-weight: 300; line-height: 1.6; }

    /* ── EQUIPA ── */
    .equipa { padding: 5.5rem 1.5rem; }
    .equipa-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem; margin-top: 3rem;
    }
    .membro-card {
      background: var(--charcoal);
      border: 1px solid var(--divider);
      border-radius: 12px; overflow: hidden;
      transition: transform 0.25s, border-color 0.25s;
    }
    .membro-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.15); }
    .membro-top {
      height: 120px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      position: relative;
    }
    .membro-card:nth-child(1) .membro-top { background: linear-gradient(135deg, var(--red-dim), transparent); }
    .membro-card:nth-child(2) .membro-top { background: linear-gradient(135deg, var(--blue-dim), transparent); }
    .membro-card:nth-child(3) .membro-top { background: linear-gradient(135deg, var(--red-dim), var(--blue-dim)); }
    .membro-stripe {
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      display: flex;
    }
    .membro-stripe span:first-child { flex: 1; background: var(--red); }
    .membro-stripe span:last-child  { flex: 1; background: var(--blue); }
    .membro-body { padding: 1.4rem; }
    .membro-nome {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--white); margin-bottom: 0.2rem;
    }
    .membro-cargo {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 0.8rem;
    }
    .membro-card:nth-child(1) .membro-cargo { color: var(--red); }
    .membro-card:nth-child(2) .membro-cargo { color: var(--blue-lt); }
    .membro-card:nth-child(3) .membro-cargo { color: var(--gray-lt); }
    .membro-bio { font-size: 0.82rem; color: var(--gray); font-weight: 300; line-height: 1.65; }

    /* ── NÚMEROS ── */
    .numeros { background: var(--black); padding: 5.5rem 1.5rem; }
    .numeros-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; margin-top: 3rem;
      background: var(--divider);
      border: 1px solid var(--divider);
      border-radius: 12px; overflow: hidden;
    }
    .numero-item {
      background: var(--charcoal);
      padding: 2rem 1.5rem; text-align: center;
      transition: background 0.25s;
    }
    .numero-item:hover { background: var(--charcoal-lt); }
    .numero-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 900; line-height: 1;
      display: block; margin-bottom: 0.5rem;
    }
    .numero-item:nth-child(odd)  .numero-val { color: var(--red); }
    .numero-item:nth-child(even) .numero-val { color: var(--blue-lt); }
    .numero-label { font-size: 0.72rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); }

    /* ── VISÃO FUTURA ── */
    .visao-section { padding: 5.5rem 1.5rem; position: relative; overflow: hidden; }
    .visao-section::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(to bottom, var(--red), var(--blue));
    }
    .roadmap {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem; margin-top: 3rem;
    }
    .roadmap-item {
      background: var(--charcoal);
      border: 1px solid var(--divider);
      border-radius: 10px; padding: 1.8rem;
      display: flex; gap: 1.2rem;
      transition: border-color 0.25s, transform 0.25s;
    }
    .roadmap-item:hover { border-color: rgba(255,255,255,0.15); transform: translateX(4px); }
    .roadmap-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.5rem; font-weight: 900; line-height: 1;
      flex-shrink: 0; width: 2.5rem;
    }
    .roadmap-item:nth-child(odd)  .roadmap-num { color: var(--red); }
    .roadmap-item:nth-child(even) .roadmap-num { color: var(--blue-lt); }
    .roadmap-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--white); margin-bottom: 0.4rem;
    }
    .roadmap-desc { font-size: 0.82rem; color: var(--gray); font-weight: 300; line-height: 1.65; }

    /* ── CTA ── */
    .cta-section {
      background: var(--charcoal);
      border-top: 1px solid var(--divider);
      padding: 5rem 1.5rem; text-align: center;
      position: relative; overflow: hidden;
    }
    .cta-section::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 80% at 20% 50%, rgba(214,40,40,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 50%, rgba(29,78,216,0.07) 0%, transparent 60%);
    }
    .cta-section .container { position: relative; }
    .cta-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 900; text-transform: uppercase; letter-spacing: 0.02em; color: var(--white); margin-bottom: 0.8rem; }
    .cta-title .red  { color: var(--red); }
    .cta-title .blue { color: var(--blue-lt); }
    .cta-sub { font-size: 1rem; color: var(--gray); font-weight: 300; margin-bottom: 2.5rem; }
    .cta-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn-blue { background: var(--blue); color: var(--white); font-family: 'Barlow', sans-serif; font-size: 0.88rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.9rem 2.2rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.22s; }
    .btn-blue:hover { background: var(--blue-lt); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(29,78,216,0.35); }
    .btn-wpp { background: #25D366; color: white; font-family: 'Barlow', sans-serif; font-size: 0.88rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.9rem 2.2rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.22s; }
    .btn-wpp:hover { background: #1da851; transform: translateY(-2px); }

    /* ── FOOTER ── */
    footer { background: var(--black); border-top: 1px solid var(--divider); padding: 4rem 1.5rem 2rem; }
    .footer-inner { max-width: 1200px; margin: 0 auto; }
    .footer-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 3rem; margin-bottom: 3rem; flex-wrap: wrap; }
    .footer-brand-block { max-width: 280px; }
    .footer-tagline { font-size: 0.82rem; color: var(--gray); font-style: italic; margin: 0.5rem 0 1rem; }
    .footer-brand-desc { font-size: 0.8rem; color: var(--gray); font-weight: 300; line-height: 1.75; margin-bottom: 1.2rem; }
    .footer-soc
